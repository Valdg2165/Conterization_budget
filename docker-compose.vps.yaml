services:
  frontend:
    ports: []

  caddy:
    image: caddy:2.9-alpine
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend-net

volumes:
  caddy-data:
  caddy-config:

